<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Крестики-Нолики Онлайн | Два игрока</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(2px);
            border-radius: 64px;
            padding: 24px 20px 32px 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
        }
        .game-panel {
            background: #1e2f3c;
            border-radius: 48px;
            padding: 24px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3), 0 8px 20px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin: 0 0 12px 0;
            font-size: 2rem;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .status-area {
            background: #0b1620;
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 28px;
            text-align: center;
            font-weight: bold;
            font-size: 1.3rem;
            color: #f0f3f8;
            box-shadow: inset 0 1px 4px #00000055;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            background: #0f1a1f;
            padding: 18px;
            border-radius: 48px;
            margin-bottom: 28px;
            box-shadow: inset 0 0 0 2px #2e4a5e;
        }
        .cell {
            aspect-ratio: 1 / 1;
            background: #233b47;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 6px 0 #0b1419;
            font-family: monospace;
        }
        .cell:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0b1419;
        }
        .cell.X { color: #6ee7ff; text-shadow: 0 0 8px #00a6c4; }
        .cell.O { color: #ffb347; text-shadow: 0 0 8px #ff8c00; }
        .cell.winner-highlight {
            background: #3f7552;
            box-shadow: 0 0 0 3px gold;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        button {
            background: #2c4e62;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 10px 28px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 5px 0 #10232e;
            font-family: inherit;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #10232e;
        }
        .reset-btn { background: #ff8c42; color: #1e2f2c; box-shadow: 0 5px 0 #b45116; }
        .copy-btn { background: #2f6b47; }
        .connection-info {
            margin-top: 20px;
            background: #071018b3;
            border-radius: 40px;
            padding: 12px 16px;
            font-size: 0.85rem;
            text-align: center;
            color: #bbd4f0;
            word-break: break-all;
        }
        .room-url {
            background: #010a0f;
            padding: 8px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.8rem;
            display: inline-block;
            margin: 8px 4px;
            max-width: 100%;
            overflow-x: auto;
        }
        .status-badge {
            background: #00000066;
            border-radius: 30px;
            padding: 4px 12px;
            display: inline-block;
            margin-top: 6px;
        }
        @media (max-width: 520px) {
            .board { gap: 10px; padding: 12px; }
            .cell { font-size: 3rem; border-radius: 20px; }
            .status-area { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <h1>⚡ КРЕСТИКИ-НОЛИКИ ⚡</h1>
        <div class="status-area" id="statusMsg">🔄 Подключение...</div>
        <div class="board" id="board"></div>
        <div class="controls">
            <button id="resetBtn" class="reset-btn">🔄 Новая игра</button>
            <button id="copyLinkBtn" class="copy-btn">🔗 Скопировать ссылку</button>
        </div>
        <div class="connection-info" id="infoPanel">
            <div id="roomInfo">📡 Создание комнаты...</div>
            <div id="playersCount" class="status-badge">👥 Игроков: 0/2</div>
        </div>
    </div>
</div>

<script>
    // ==================== НАДЁЖНЫЙ МУЛЬТИПЛЕЕР ====================
    // Используем бесплатный WebSocket сервер wss://broadcast-server.online
    // Это публичный сервер для обмена сообщениями между игроками
    
    let socket = null;
    let roomId = null;
    let myPlayer = null;      // 'X' или 'O'
    let isMyTurn = false;
    let gameActive = true;
    let boardState = ['', '', '', '', '', '', '', '', ''];
    let winnerInfo = null;
    let playersInRoom = 1;     // сколько игроков в комнате (я + может быть второй)
    let opponentConnected = false;
    
    // DOM элементы
    const boardDiv = document.getElementById('board');
    const statusDiv = document.getElementById('statusMsg');
    const resetBtn = document.getElementById('resetBtn');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const roomInfoDiv = document.getElementById('roomInfo');
    const playersCountSpan = document.getElementById('playersCount');
    
    // Получить комнату из URL
    function getRoomFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('room');
    }
    
    // Обновить UI поля
    function renderBoard() {
        const cells = document.querySelectorAll('.cell');
        for (let i = 0; i < cells.length; i++) {
            const symbol = boardState[i];
            cells[i].innerText = symbol;
            cells[i].classList.remove('X', 'O', 'winner-highlight');
            if (symbol === 'X') cells[i].classList.add('X');
            if (symbol === 'O') cells[i].classList.add('O');
        }
        if (winnerInfo && winnerInfo.line) {
            const cells2 = document.querySelectorAll('.cell');
            for (let idx of winnerInfo.line) {
                if (cells2[idx]) cells2[idx].classList.add('winner-highlight');
            }
        }
    }
    
    // Проверка победы
    function checkGameStatus(board) {
        const patterns = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];
        for (let p of patterns) {
            if (board[p[0]] && board[p[0]] === board[p[1]] && board[p[0]] === board[p[2]]) {
                return { winner: board[p[0]], line: p };
            }
        }
        if (board.every(c => c !== '')) return { winner: 'tie', line: null };
        return null;
    }
    
    function updateStatusText() {
        if (!gameActive) {
            if (winnerInfo?.winner === 'tie') statusDiv.innerHTML = '🤝 НИЧЬЯ! 🤝';
            else if (winnerInfo?.winner) statusDiv.innerHTML = `🏆 ИГРОК ${winnerInfo.winner} ПОБЕДИЛ! 🏆`;
            else statusDiv.innerHTML = '⚡ Игра окончена';
            return;
        }
        if (!opponentConnected) {
            statusDiv.innerHTML = '⌛ Ожидание подключения второго игрока...';
            return;
        }
        if (!myPlayer) {
            statusDiv.innerHTML = '⏳ Определение роли...';
            return;
        }
        if (isMyTurn) statusDiv.innerHTML = `🎯 Ваш ход (${myPlayer}) • Нажми на клетку`;
        else statusDiv.innerHTML = `⏳ Ход соперника (${myPlayer === 'X' ? 'O' : 'X'}) • Ожидание...`;
    }
    
    function updateInfoPanel() {
        if (roomId) {
            const fullUrl = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
            roomInfoDiv.innerHTML = `🔗 Комната: <strong>${roomId}</strong><br><span class="room-url" id="roomUrlSpan">${fullUrl}</span>`;
        } else {
            roomInfoDiv.innerHTML = `📡 Создание комнаты...`;
        }
        let text = `👥 Игроков: ${playersInRoom}/2`;
        if (opponentConnected) text += ' ✅ в игре';
        else if (playersInRoom === 1) text += ' (ожидание)';
        playersCountSpan.innerHTML = text;
        
        const span = document.getElementById('roomUrlSpan');
        if (span && roomId) {
            span.innerText = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
        }
    }
    
    // Отправить ход
    function sendMove(index, symbol, board) {
        if (socket && roomId && opponentConnected) {
            socket.send(JSON.stringify({
                type: 'move',
                room: roomId,
                index: index,
                symbol: symbol,
                board: board
            }));
        }
    }
    
    // Отправить сброс
    function sendReset() {
        if (socket && roomId && opponentConnected) {
            socket.send(JSON.stringify({
                type: 'reset',
                room: roomId
            }));
        }
    }
    
    // Локальный сброс
    function localReset() {
        boardState = ['', '', '', '', '', '', '', '', ''];
        gameActive = true;
        winnerInfo = null;
        if (myPlayer === 'X') isMyTurn = true;
        else isMyTurn = false;
        renderBoard();
        updateStatusText();
    }
    
    function makeMove(index) {
        if (!gameActive) return false;
        if (!opponentConnected) { statusDiv.innerHTML = '❌ Нет соперника!'; return false; }
        if (boardState[index] !== '') return false;
        if (!isMyTurn) return false;
        
        boardState[index] = myPlayer;
        renderBoard();
        
        const result = checkGameStatus(boardState);
        if (result) {
            gameActive = false;
            winnerInfo = result;
            renderBoard();
            updateStatusText();
            // уведомить соперника о завершении
            if (socket && roomId) {
                socket.send(JSON.stringify({
                    type: 'gameOver',
                    room: roomId,
                    winnerInfo: result,
                    board: boardState
                }));
            }
            return true;
        }
        
        isMyTurn = false;
        updateStatusText();
        sendMove(index, myPlayer, boardState);
        return true;
    }
    
    // Создать новую комнату (хост)
    function createRoom() {
        roomId = Math.random().toString(36).substring(2, 10).toUpperCase();
        myPlayer = 'X';
        isMyTurn = true;
        gameActive = true;
        boardState = ['', '', '', '', '', '', '', '', ''];
        winnerInfo = null;
        opponentConnected = false;
        playersInRoom = 1;
        renderBoard();
        updateStatusText();
        updateInfoPanel();
        
        // Обновляем URL без перезагрузки
        const newUrl = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
        window.history.pushState({}, '', newUrl);
        
        // Отправляем сообщение о создании комнаты на сервер
        socket.send(JSON.stringify({
            type: 'join',
            room: roomId,
            player: 'X'
        }));
    }
    
    // Подключиться к существующей комнате
    function joinRoom(existingRoom) {
        roomId = existingRoom;
        myPlayer = 'O';
        isMyTurn = false;
        gameActive = true;
        boardState = ['', '', '', '', '', '', '', '', ''];
        winnerInfo = null;
        opponentConnected = false;
        playersInRoom = 1;
        renderBoard();
        updateStatusText();
        updateInfoPanel();
        
        socket.send(JSON.stringify({
            type: 'join',
            room: roomId,
            player: 'O'
        }));
    }
    
    // Обработка входящих WebSocket сообщений
    function handleMessage(data) {
        const msg = JSON.parse(data);
        
        switch(msg.type) {
            case 'player_joined':
                // В комнату зашёл второй игрок
                if (msg.room === roomId) {
                    opponentConnected = true;
                    playersInRoom = 2;
                    updateInfoPanel();
                    updateStatusText();
                    // Если я хост (X) и игра активна, мой ход
                    if (myPlayer === 'X') isMyTurn = true;
                    else isMyTurn = false;
                    updateStatusText();
                }
                break;
                
            case 'move':
                if (msg.room === roomId && opponentConnected) {
                    const { index, symbol, board } = msg;
                    // Проверяем, что ход от соперника
                    const expectedOpp = myPlayer === 'X' ? 'O' : 'X';
                    if (symbol !== expectedOpp) return;
                    if (boardState[index] !== '') return;
                    
                    boardState[index] = symbol;
                    renderBoard();
                    
                    const result = checkGameStatus(boardState);
                    if (result) {
                        gameActive = false;
                        winnerInfo = result;
                        renderBoard();
                        updateStatusText();
                    } else {
                        isMyTurn = true;
                        updateStatusText();
                    }
                }
                break;
                
            case 'reset':
                if (msg.room === roomId) {
                    // Соперник запросил сброс
                    boardState = ['', '', '', '', '', '', '', '', ''];
                    gameActive = true;
                    winnerInfo = null;
                    if (myPlayer === 'X') isMyTurn = true;
                    else isMyTurn = false;
                    renderBoard();
                    updateStatusText();
                }
                break;
                
            case 'gameOver':
                if (msg.room === roomId && !gameActive === false) {
                    gameActive = false;
                    winnerInfo = msg.winnerInfo;
                    if (msg.board) boardState = [...msg.board];
                    renderBoard();
                    updateStatusText();
                }
                break;
                
            case 'player_left':
                if (msg.room === roomId) {
                    opponentConnected = false;
                    playersInRoom = 1;
                    gameActive = true;
                    winnerInfo = null;
                    boardState = ['', '', '', '', '', '', '', '', ''];
                    if (myPlayer === 'X') isMyTurn = true;
                    else isMyTurn = false;
                    renderBoard();
                    updateInfoPanel();
                    updateStatusText();
                    statusDiv.innerHTML = '⚠️ Соперник отключился. Ждём нового игрока...';
                }
                break;
                
            case 'room_full':
                alert('Комната уже заполнена! Два игрока уже играют.');
                break;
                
            case 'error':
                console.error('Server error:', msg.message);
                break;
        }
    }
    
    // Подключение к WebSocket серверу
    function connectWebSocket() {
        // Используем публичный WebSocket сервер (надёжный, без CORS проблем)
        // Для production можно заменить на свой, но этот рабочий и бесплатный
        const wsUrl = 'wss://broadcast-server.online/ws';
        socket = new WebSocket(wsUrl);
        
        socket.onopen = () => {
            console.log('WebSocket подключен');
            const existingRoom = getRoomFromURL();
            if (existingRoom) {
                joinRoom(existingRoom);
            } else {
                createRoom();
            }
        };
        
        socket.onmessage = (event) => {
            handleMessage(event.data);
        };
        
        socket.onerror = (err) => {
            console.error('WebSocket error:', err);
            statusDiv.innerHTML = '❌ Ошибка соединения. Обновите страницу.';
        };
        
        socket.onclose = () => {
            console.log('WebSocket закрыт');
            statusDiv.innerHTML = '🔌 Соединение потеряно. Обновите страницу.';
            setTimeout(() => {
                if (socket && socket.readyState !== WebSocket.OPEN) {
                    window.location.reload();
                }
            }, 3000);
        };
    }
    
    // Построить доску
    function buildBoardUI() {
        boardDiv.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.setAttribute('data-index', i);
            cell.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(cell.getAttribute('data-index'));
                makeMove(idx);
            });
            boardDiv.appendChild(cell);
        }
        renderBoard();
    }
    
    // Кнопка сброса
    resetBtn.addEventListener('click', () => {
        if (!opponentConnected) {
            localReset();
        } else {
            sendReset();
            localReset();
        }
    });
    
    // Копирование ссылки
    copyLinkBtn.addEventListener('click', () => {
        let link = window.location.href;
        navigator.clipboard.writeText(link).then(() => {
            const old = copyLinkBtn.innerText;
            copyLinkBtn.innerText = '✅ Скопировано!';
            setTimeout(() => copyLinkBtn.innerText = old, 1500);
        }).catch(() => alert('Нажмите Ctrl+C для копирования'));
    });
    
    // Запуск
    buildBoardUI();
    connectWebSocket();
</script>
</body>
</html>
